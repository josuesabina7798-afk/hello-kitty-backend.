<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Kitty - Panel del Novio 👦</title>
    <style>
        :root { --primary: #FF61A6; --secondary: #FFB7C5; --bg: #FFF0F5; }
        body { font-family: 'Comic Sans MS', cursive; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 350px; background: white; border-radius: 30px; border: 8px solid #2d2d2d; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .header { background: var(--primary); color: white; padding: 30px 20px; text-align: center; border-bottom: 4px solid white; }
        .content { padding: 20px; }
        .notif { background: #fff3cd; border: 2px dashed #ffc107; padding: 15px; border-radius: 15px; font-size: 14px; margin-bottom: 20px; display: none; animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }
        textarea { width: 100%; height: 100px; border-radius: 15px; border: 2px solid var(--secondary); padding: 10px; box-sizing: border-box; font-family: inherit; margin-bottom: 10px; }
        .btn { background: var(--primary); color: white; padding: 15px; border-radius: 20px; text-align: center; font-weight: bold; cursor: pointer; border: 3px solid white; }
        .footer { font-size: 11px; color: #888; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div style="font-size: 20px;">Cuidado de Mi Niña 👦♥</div>
        </div>
        <div class="content">
            <div id="alertaKitty" class="notif"></div>
            
            <p style="font-size: 14px;"><b>Mándale un aviso a Kitty:</b></p>
            <textarea id="aviso" placeholder="Cuéntale algo: No ha comido, está cansada, etc..."></textarea>
            <div class="btn" onclick="enviarAviso()">Chismear a Kitty 🎀</div>
            
            <div class="footer">Este panel te avisará si Kitty nota que ella se siente mal.</div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // CONFIGURACIÓN: Aquí pondremos la URL de Internet cuando subas el backend
        const SERVER_URL = "https://hello-kitty-backend-production.up.railway.app"; 
        const socket = io(SERVER_URL);
        const coupleId = "NUESTRA-PAREJA"; // Cambia esto por un ID secreto de ustedes

        socket.emit('join_couple', coupleId);

        socket.on('notificar_novio', (data) => {
            const div = document.getElementById('alertaKitty');
            div.innerText = data.mensaje;
            div.style.display = 'block';
            window.navigator.vibrate && window.navigator.vibrate(200);
        });

        async function enviarAviso() {
            const txt = document.getElementById('aviso').value;
            if(!txt) return;
            
            socket.emit('send_alert', { coupleId, content: txt });
            alert("¡Kitty recibió el aviso! Estará pendiente de ella. 🎀");
            document.getElementById('aviso').value = "";
        }
    </script>
</body>
</html>
