<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Kitty - Mi Mejor Amiga 🎀</title>
    <style>
        :root { --primary: #FF61A6; --secondary: #FFB7C5; --bg: #FFF0F5; --text: #4A4A4A; }
        body { font-family: 'Comic Sans MS', cursive; background: var(--bg); margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .phone { width: 100%; max-width: 400px; background: var(--bg); display: flex; flex-direction: column; border-left: 4px solid var(--secondary); border-right: 4px solid var(--secondary); }
        .header { background: var(--primary); padding: 40px 15px 15px; text-align: center; color: white; border-bottom: 5px solid white; }
        .kitty-pic { width: 80px; height: 80px; background: white; border-radius: 50%; margin: 0 auto 10px; border: 3px solid white; overflow: hidden; }
        .kitty-pic img { width: 100%; height: 100%; object-fit: contain; }
        .chat { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 80%; padding: 12px 18px; border-radius: 20px; font-size: 14px; line-height: 1.4; position: relative; }
        .ai { align-self: flex-start; background: white; border: 2px solid var(--primary); color: var(--text); border-bottom-left-radius: 2px; }
        .user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .input-area { padding: 15px; background: white; display: flex; gap: 10px; border-top: 2px solid var(--secondary); }
        input { flex: 1; border: 2px solid var(--secondary); border-radius: 25px; padding: 12px 20px; outline: none; font-family: inherit; }
        .btn-send { background: var(--primary); width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; color: white; font-size: 20px; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="header">
            <div class="kitty-pic">
                <img src="kitty.jpg" alt="Kitty">
            </div>
            <div style="font-weight: bold; font-size: 16px;">Hello Kitty 🎀</div>
            <div style="font-size: 11px;">Siempre contigo, amiga ✨</div>
        </div>
        <div class="chat" id="chatContainer">
            <div class="bubble ai">¡Hola amiga! 🎀 ¿Lista para nuestro chisme de hoy? ¡Cuéntame lo que sea! ✨</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Habla con tu amiga..." onkeypress="if(event.key==='Enter') sendMessage()">
            <div class="btn-send" onclick="sendMessage()">🎀</div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN: Aquí pondremos la URL de Internet cuando subas el backend
        const API_URL = "https://hello-kitty-backend-production.up.railway.app/api/chat";
        const chatContainer = document.getElementById('chatContainer');
        const coupleId = "NUESTRA-PAREJA";

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text) return;

            addBubble(text, 'user');
            input.value = "";

            // Burbuja de "escribiendo"
            const typing = addBubble("Escribiendo... 🎀", 'ai');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ coupleId, message: text })
                });
                const data = await response.json();
                chatContainer.removeChild(typing);
                addBubble(data.response, 'ai');
            } catch (error) {
                chatContainer.removeChild(typing);
                addBubble("¡Huy amiga! Tengo el moño enredado, ¿está encendido el servidor? 🎀☁️", 'ai');
            }
        }

        function addBubble(text, side) {
            const b = document.createElement('div');
            b.className = `bubble ${side}`;
            b.innerText = text;
            chatContainer.appendChild(b);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return b;
        }
    </script>
</body>
</html>
