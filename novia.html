<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Hello Kitty - Mi Amiga 🎀</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --pink: #FF61A6; --light: #FFB7C5; --bg: #FFF0F5; }
        body { font-family: Arial, sans-serif; background: var(--bg); height: 100dvh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }

        .header { background: var(--pink); padding: 15px; text-align: center; color: white; flex-shrink: 0; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; background: white; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 3px solid white; }
        .avatar svg { width: 65px; height: 65px; }
        .header h1 { font-size: 16px; margin: 0; }
        .header p { font-size: 11px; opacity: 0.9; }

        .chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 11px 15px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .ai { align-self: flex-start; background: white; border: 2px solid var(--light); color: #333; border-bottom-left-radius: 4px; }
        .user { align-self: flex-end; background: var(--pink); color: white; border-bottom-right-radius: 4px; }
        .typing { font-style: italic; opacity: 0.7; }

        .input-area { padding: 12px; background: white; display: flex; gap: 8px; border-top: 2px solid var(--light); flex-shrink: 0; }
        .input-area input { flex: 1; border: 2px solid var(--light); border-radius: 25px; padding: 12px 18px; font-size: 14px; outline: none; }
        .input-area input:focus { border-color: var(--pink); }
        .btn-send { width: 46px; height: 46px; border-radius: 50%; background: var(--pink); color: white; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
        .btn-send:active { opacity: 0.8; transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="header">
        <div class="avatar">
            <!-- Hello Kitty SVG (funciona en cualquier dispositivo sin internet) -->
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="50" cy="54" rx="35" ry="32" fill="#fff" stroke="#FFB7C5" stroke-width="2"/>
                <ellipse cx="35" cy="30" rx="14" ry="16" fill="#fff" stroke="#FFB7C5" stroke-width="2"/>
                <ellipse cx="65" cy="30" rx="14" ry="16" fill="#fff" stroke="#FFB7C5" stroke-width="2"/>
                <ellipse cx="35" cy="55" rx="3" ry="3" fill="#333"/>
                <ellipse cx="65" cy="55" rx="3" ry="3" fill="#333"/>
                <ellipse cx="50" cy="63" rx="4" ry="3" fill="#FF9EB5"/>
                <line x1="20" y1="60" x2="42" y2="63" stroke="#333" stroke-width="1.5"/>
                <line x1="20" y1="66" x2="42" y2="65" stroke="#333" stroke-width="1.5"/>
                <line x1="58" y1="63" x2="80" y2="60" stroke="#333" stroke-width="1.5"/>
                <line x1="58" y1="65" x2="80" y2="66" stroke="#333" stroke-width="1.5"/>
                <!-- Moño rosa -->
                <ellipse cx="68" cy="22" rx="9" ry="6" fill="#FF61A6" transform="rotate(-30 68 22)"/>
                <ellipse cx="80" cy="15" rx="9" ry="6" fill="#FF61A6" transform="rotate(-30 80 15)"/>
                <ellipse cx="74" cy="18" rx="4" ry="4" fill="#FF90C0"/>
            </svg>
        </div>
        <h1>Hello Kitty 🎀</h1>
        <p>Siempre contigo, amiga ✨</p>
    </div>

    <div class="chat" id="chat">
        <div class="bubble ai">¡Hola amiga! 🎀 ¿Lista para nuestro chisme de hoy? ¡Cuéntame lo que sea! ✨</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Habla con tu amiga..." autocomplete="off">
        <button class="btn-send" id="sendBtn">🎀</button>
    </div>

    <script>
        const API_URL = "https://hello-kitty-backend-production.up.railway.app/api/chat";
        const coupleId = "NUESTRA-PAREJA";
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // Soporte para Enter en teclado y tap en móvil
        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            addBubble(text, 'user');
            input.value = "";
            input.focus();

            const typing = addBubble("Escribiendo... 🎀", 'ai typing');

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ coupleId, message: text })
                });
                const data = await res.json();
                chat.removeChild(typing);
                addBubble(data.response, 'ai');
            } catch (err) {
                chat.removeChild(typing);
                addBubble("¡Amiga! 🎀 Se fue la señal un momento, ¡vuelve a intentarlo! ✨", 'ai');
                console.error(err);
            }
        }

        function addBubble(text, cls) {
            const b = document.createElement('div');
            b.className = `bubble ${cls}`;
            b.innerText = text;
            chat.appendChild(b);
            chat.scrollTop = chat.scrollHeight;
            return b;
        }
    </script>
</body>
</html>
